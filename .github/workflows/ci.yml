name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, postgres]
    # The postgres service container runs on both matrix legs. GitHub Actions
    # has no clean way to make the `services` block itself conditional on a
    # matrix value; an idle postgres container on the sqlite leg is harmless.
    services:
      postgres:
        image: postgres:17
        env:
          # CI-only throwaway credentials for an ephemeral service container
          # that exists only for the duration of the job. Not a real secret.
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Test (sqlite)
        if: matrix.db == 'sqlite'
        run: bun run test
      - name: Test (postgres)
        if: matrix.db == 'postgres'
        run: bun run test
        env:
          # PG integration tests self-skip unless this is set. Same CI-only
          # throwaway service credentials as above.
          HATCHECK_TEST_PG_URL: postgres://postgres:postgres@localhost:5432/postgres
      - name: Build web bundle
        run: bun run build
      # E2E runs on one leg only; it exercises sqlite standalone mode.
      # serve.ts rebuilds the bundle itself, so ordering after the build
      # step is belt-and-braces, not a dependency.
      - name: Install Playwright browsers
        if: matrix.db == 'sqlite'
        run: bunx playwright install --with-deps chromium
      - name: E2E (playwright)
        if: matrix.db == 'sqlite'
        run: bun run e2e

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # `bun audit` verified working on bun 1.3.14. It exits non-zero when
      # advisories at or above the threshold are found. Threshold is `high`
      # because a known `moderate` advisory (GHSA-67mh-4wv8-2f99, esbuild dev
      # server) sits in dev-only transitive deps of drizzle-kit and vite/tsx
      # until upstream bumps esbuild; Dependabot (see .github/dependabot.yml)
      # tracks the fix. Tighten back to the default level once it clears.
      - name: Dependency vulnerability audit
        run: bun audit --audit-level=high
        continue-on-error: false
